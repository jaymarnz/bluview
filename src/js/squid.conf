# To use with BluView and avoid CORS security issues:
#   1. Run squid on Rpi currently at 192.168.68.79
#   2. Configure Android tablet using WiFi settings for proxy server at that address and port 3128
#   3. http:/172.16.0.3/bluview/ will go through the proxy to that address with CORS headers added to all traffic
#
# Current IP addresses:
#   squid server:   192.168.68.79:3128
#   bluview server: http://172.16.0.3/bluview/
#   NODE streamer:  192.168.68.50
#   dial server:    192.168.68.69
#

#debug_options ALL,2 33,9 34,9
#debug_options ALL,1

acl localnet_src src 0.0.0.1-0.255.255.255	# RFC 1122 "this" network (LAN)
acl localnet_src src 10.0.0.0/8		# RFC 1918 local private network (LAN)
acl localnet_src src 100.64.0.0/10		# RFC 6598 shared address space (CGN)
acl localnet_src src 169.254.0.0/16		# RFC 3927 link-local (directly plugged) machines
acl localnet_src src 172.16.0.0/12		# RFC 1918 local private network (LAN)
acl localnet_src src 192.168.0.0/16		# RFC 1918 local private network (LAN)
acl localnet_src src fc00::/7		# RFC 4193 local private network range
acl localnet_src src fe80::/10		# RFC 4291 link-local (directly plugged) machines

acl localnet_dst dst 0.0.0.1-0.255.255.255	# RFC 1122 "this" network (LAN)
acl localnet_dst dst 10.0.0.0/8		# RFC 1918 local private network (LAN)
acl localnet_dst dst 100.64.0.0/10		# RFC 6598 shared address space (CGN)
acl localnet_dst dst 169.254.0.0/16		# RFC 3927 link-local (directly plugged) machines
acl localnet_dst dst 172.16.0.0/12		# RFC 1918 local private network (LAN)
acl localnet_dst dst 192.168.0.0/16		# RFC 1918 local private network (LAN)
acl localnet_dst dst fc00::/7		# RFC 4193 local private network range
acl localnet_dst dst fe80::/10		# RFC 4291 link-local (directly plugged) machines


# port rules
acl Safe_ports port 80		# http
acl Safe_ports port 443		# https
acl Safe_ports port 1025-65535	# unregistered ports
#acl Safe_ports port 21		# ftp
#acl Safe_ports port 70		# gopher
#acl Safe_ports port 210		# wais
#acl Safe_ports port 280		# http-mgmt
#acl Safe_ports port 488		# gss-http
#acl Safe_ports port 591		# filemaker
#acl Safe_ports port 777		# multiling http

http_access deny !Safe_ports

# Deny CONNECT to other than secure SSL ports and dialserver websocket port
acl CONNECT_ports port 443 3000
http_access deny CONNECT !CONNECT_ports

# Only allow cachemgr access from localhost
http_access allow localhost manager
http_access deny manager

# We strongly recommend the following be uncommented to protect innocent
# web applications running on the proxy server who think the only
# one who can access services on "localhost" is a local user
#http_access deny to_localhost

# add CORS headers. This relies on the following rules which only allow localnet clients
reply_header_add Access-Control-Allow-Origin "*" localnet_src localnet_dst
reply_header_add Access-Control-Allow-Methods "GET,POST,OPTIONS" localnet_src localnet_dst
reply_header_add Access-Control-Allow-Headers "Content-Type" localnet_src localnet_dst

# allow local network clients
http_access allow localnet_src
http_access allow localhost

# pass non-local destinations untouched
always_direct allow !localnet_dst

# And finally deny all other access to this proxy
http_access deny all

# listen on all ports
http_port 3128

# Uncomment and adjust the following to add a disk cache directory.
#cache_dir ufs /var/spool/squid 100 16 256

# Leave coredumps in the first cache dir
coredump_dir /var/spool/squid

#
# Add any of your own refresh_pattern entries above these.
#
#refresh_pattern ^ftp:		1440	20%	10080
#refresh_pattern -i (/cgi-bin/|\?) 0	0%	0
#refresh_pattern .		0	20%	4320

# don't log origin success codes - to keep the logs from filling up the disk
# unfortunately rep_status (or status) don't exist in the version of squid running on Rpi
# acl OK rep_status 200 201 202 203 204 206 301 302 303 304
# access_log none OK

# Turn off all access logging to save on disk space - comment this out for troubleshooting
access_log none
